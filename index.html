<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNT Equivalent Calculator</title>
    <style>
        :root {
            --primary: #e63946;
            --dark: #1d3557;
            --light: #f1faee;
            --accent: #a8dadc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--primary);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c1121f;
        }

        #resultBox {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--accent);
            border-radius: 6px;
            display: none;
            text-align: center;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--dark);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TNT Equivalent</h1>
    <p class="subtitle">Kalkulator Potensi Energi Ledakan</p>

    <div class="input-group">
        <label for="mass">Massa Bahan (kg)</label>
        <input type="number" id="mass" placeholder="Contoh: 10" step="any">
    </div>

    <div class="input-group">
        <label for="material">Jenis Bahan Peledak</label>
        <select id="material">
            <option value="1.0">TNT (Standard)</option>
            <option value="1.3">C4 / Composition B</option>
            <option value="1.6">PETN</option>
            <option value="0.42">Black Powder</option>
            <option value="0.8">ANFO</option>
            <option value="1.2">Nitroglycerin</option>
        </select>
    </div>

    <button onclick="calculateTNT()">Hitung Ekuivalen</button>

    <div id="resultBox">
        <div>Ekuivalen Massa TNT:</div>
        <div class="result-value" id="tntOutput">0 kg</div>
        <div style="margin-top: 10px; font-size: 0.85rem;" id="energyOutput"></div>
    </div>
</div>

<script>
    function calculateTNT() {
        const mass = document.getElementById('mass').value;
        const factor = document.getElementById('material').value;
        const resultBox = document.getElementById('resultBox');
        const tntOutput = document.getElementById('tntOutput');
        const energyOutput = document.getElementById('energyOutput');

        if (mass <= 0 || mass === "") {
            alert("Harap masukkan massa yang valid!");
            return;
        }

        // Kalkulasi
        const tntEquivalent = mass * factor;
        const energyJoules = tntEquivalent * 4.184e6; // 1 kg TNT ~ 4.184 MJ

        // Tampilkan Hasil
        tntOutput.innerText = tntEquivalent.toFixed(3) + " kg TNT";
        energyOutput.innerText = "Estimasi Energi: " + (energyJoules / 1e6).toFixed(2) + " MJ";
        
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
